<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane backgrounds -->
<rect x="30" y="36" width="200" height="310" rx="12" fill="#E1F5EE" opacity="0.5"/>
<rect x="450" y="36" width="200" height="310" rx="12" fill="#E6F1FB" opacity="0.5"/>

<!-- Lane labels -->
<text font-size="12" x="130" y="26" text-anchor="middle" fill="#0F6E56" font-weight="500">Human Policy Flow</text>
<text font-size="12" x="550" y="26" text-anchor="middle" fill="#185FA5" font-weight="500">Agent Action Flow</text>

<!-- LEFT LANE -->
<rect x="50" y="48" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="130" y="70" text-anchor="middle" dominant-baseline="central" fill="#085041">Human Operator</text>
<line x1="130" y1="92" x2="130" y2="118" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="36" y="120" width="188" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="130" y="140" text-anchor="middle" dominant-baseline="central" fill="#085041">Natural-language</text>
<text font-size="14" font-weight="500" x="130" y="158" text-anchor="middle" dominant-baseline="central" fill="#085041">Safety Instruction</text>
<line x1="130" y1="172" x2="130" y2="198" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="50" y="200" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="130" y="222" text-anchor="middle" dominant-baseline="central" fill="#085041">Policy Compiler</text>
<line x1="130" y1="244" x2="130" y2="270" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="36" y="272" width="188" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="130" y="294" text-anchor="middle" dominant-baseline="central" fill="#085041">Structured Policy Store</text>

<!-- RIGHT LANE -->
<rect x="468" y="48" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="548" y="70" text-anchor="middle" dominant-baseline="central" fill="#0C447C">AI Agent</text>
<line x1="548" y1="92" x2="548" y2="118" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="454" y="120" width="188" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="548" y="140" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Proposed Infrastructure</text>
<text font-size="14" font-weight="500" x="548" y="158" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Action</text>
<line x1="548" y1="172" x2="548" y2="198" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="454" y="200" width="188" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="548" y="222" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Agent Sentinel Gateway</text>

<!-- MERGE ARROWS -->
<path d="M224 294 Q340 294 340 370" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.8"/>
<path d="M454 222 Q340 222 340 370" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.8"/>

<!-- EVALUATION BOX -->
<rect x="170" y="372" width="340" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Policy Match + Risk Scoring</text>
<text font-size="14" font-weight="500" x="340" y="412" text-anchor="middle" dominant-baseline="central" fill="#3C3489">+ Sequence Analysis</text>
<line x1="340" y1="432" x2="340" y2="458" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Decision Engine -->
<rect x="230" y="460" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="482" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Decision Engine</text>

<!-- Three arrows from Decision Engine -->
<line x1="260" y1="504" x2="120" y2="560" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="504" x2="340" y2="560" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="504" x2="560" y2="560" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ALLOW -->
<rect x="44" y="562" width="152" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="120" y="584" text-anchor="middle" dominant-baseline="central" fill="#27500A">ALLOW</text>
<line x1="120" y1="606" x2="120" y2="632" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- BLOCK -->
<rect x="264" y="562" width="152" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="584" text-anchor="middle" dominant-baseline="central" fill="#791F1F">BLOCK</text>
<line x1="340" y1="606" x2="340" y2="632" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- REQUIRE HUMAN APPROVAL -->
<rect x="484" y="562" width="152" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="560" y="576" text-anchor="middle" dominant-baseline="central" fill="#633806">REQUIRE HUMAN</text>
<text font-size="14" font-weight="500" x="560" y="594" text-anchor="middle" dominant-baseline="central" fill="#633806">APPROVAL</text>
<line x1="560" y1="606" x2="560" y2="632" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Cloud Executor -->
<rect x="30" y="634" width="180" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="120" y="654" text-anchor="middle" dominant-baseline="central" fill="#27500A">Cloud Executor /</text>
<text font-size="14" font-weight="500" x="120" y="672" text-anchor="middle" dominant-baseline="central" fill="#27500A">Infrastructure API</text>

<!-- Denial Returned -->
<rect x="264" y="634" width="152" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="654" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Denial Returned</text>
<text font-size="14" font-weight="500" x="340" y="672" text-anchor="middle" dominant-baseline="central" fill="#791F1F">to Agent</text>

<!-- Escalation Path -->
<rect x="484" y="634" width="152" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="560" y="654" text-anchor="middle" dominant-baseline="central" fill="#633806">Escalation Path</text>
<text font-size="12" x="560" y="672" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Slack / dashboard</text>

<!-- Arrows to Audit Log -->
<path d="M120 686 Q120 750 300 790" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>
<path d="M340 686 L340 792" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>
<path d="M560 686 Q560 750 400 790" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.7"/>

<!-- Audit Log -->
<rect x="210" y="794" width="260" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="816" text-anchor="middle" dominant-baseline="central" fill="#444441">Audit / Action Log</text>

<!-- Footer -->
<text font-size="11" x="340" y="874" text-anchor="middle" fill="#888780">Agent Sentinel: Human Policy and Agent Action Workflow</text>
</svg>
