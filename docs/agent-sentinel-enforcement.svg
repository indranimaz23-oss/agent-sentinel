<svg width="680" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-size="13" font-weight="500" x="340" y="22" text-anchor="middle" fill="#444441">Enforcement Architecture: How Sentinel Intercepts the Agent</text>

<!-- AI Agent -->
<rect x="220" y="38" width="240" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="#0C447C">AI Agent</text>
<text font-size="12" x="340" y="82" text-anchor="middle" dominant-baseline="central" fill="#185FA5">LLM + tool-calling runtime</text>
<line x1="340" y1="102" x2="340" y2="132" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" x="360" y="120" fill="#888780">tool call</text>

<!-- Sentinel Gateway dashed container -->
<rect x="60" y="136" width="560" height="340" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1" stroke-dasharray="6 3"/>
<text font-size="12" font-weight="500" x="100" y="158" fill="#3C3489">Agent Sentinel Gateway — mandatory enforcement boundary</text>

<!-- SDK Interceptor -->
<rect x="200" y="168" width="280" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="186" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Sentinel SDK / Interceptor</text>
<text font-size="12" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#534AB7">wraps every tool call — agent cannot bypass</text>
<line x1="340" y1="216" x2="340" y2="244" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Three eval boxes -->
<rect x="80" y="246" width="154" height="64" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="157" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Policy Engine</text>
<text font-size="11" x="157" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Rego / OPA rules</text>
<text font-size="11" x="157" y="298" text-anchor="middle" dominant-baseline="central" fill="#534AB7">deterministic match</text>

<rect x="263" y="246" width="154" height="64" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Risk Scorer</text>
<text font-size="11" x="340" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">action + env + resource</text>
<text font-size="11" x="340" y="298" text-anchor="middle" dominant-baseline="central" fill="#534AB7">score 0.0 → 1.0</text>

<rect x="446" y="246" width="154" height="64" rx="8" fill="#ffffff" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="523" y="266" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Sequence Monitor</text>
<text font-size="11" x="523" y="284" text-anchor="middle" dominant-baseline="central" fill="#534AB7">session history</text>
<text font-size="11" x="523" y="298" text-anchor="middle" dominant-baseline="central" fill="#534AB7">chain detection</text>

<!-- Fan lines -->
<path d="M340 244 L157 244 L157 246" fill="none" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<path d="M340 244 L340 246" fill="none" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<path d="M340 244 L523 244 L523 246" fill="none" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>

<!-- Converge lines -->
<line x1="157" y1="310" x2="157" y2="346" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<line x1="340" y1="310" x2="340" y2="346" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<line x1="523" y1="310" x2="523" y2="346" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<path d="M157 346 L340 346 L523 346" fill="none" stroke="#534AB7" stroke-width="0.8" opacity="0.6"/>
<line x1="340" y1="346" x2="340" y2="366" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Decision Aggregator -->
<rect x="200" y="368" width="280" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="386" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Decision Aggregator</text>
<text font-size="12" x="340" y="404" text-anchor="middle" dominant-baseline="central" fill="#534AB7">worst-case wins: BLOCK overrides ALLOW</text>

<line x1="340" y1="476" x2="340" y2="510" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- ALLOW -->
<path d="M340 510 L120 510 L120 512" fill="none" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="44" y="512" width="152" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="120" y="534" text-anchor="middle" dominant-baseline="central" fill="#27500A">ALLOW</text>

<!-- BLOCK -->
<line x1="340" y1="510" x2="340" y2="512" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="264" y="512" width="152" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="534" text-anchor="middle" dominant-baseline="central" fill="#791F1F">BLOCK</text>

<!-- HUMAN -->
<path d="M340 510 L560 510 L560 512" fill="none" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="484" y="512" width="152" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="560" y="526" text-anchor="middle" dominant-baseline="central" fill="#633806">REQUIRE HUMAN</text>
<text font-size="14" font-weight="500" x="560" y="544" text-anchor="middle" dominant-baseline="central" fill="#633806">APPROVAL</text>

<!-- ALLOW path -->
<line x1="120" y1="556" x2="120" y2="592" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="44" y="594" width="152" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="120" y="614" text-anchor="middle" dominant-baseline="central" fill="#27500A">Sentinel executes</text>
<text font-size="12" x="120" y="632" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">calls AWS API on behalf</text>
<line x1="120" y1="646" x2="120" y2="676" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="44" y="678" width="152" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="120" y="700" text-anchor="middle" dominant-baseline="central" fill="#27500A">AWS / Cloud API</text>

<!-- BLOCK path -->
<line x1="340" y1="556" x2="340" y2="592" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="264" y="594" width="152" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="614" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Action rejected</text>
<text font-size="12" x="340" y="632" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">error returned to agent</text>
<line x1="340" y1="646" x2="340" y2="676" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="264" y="678" width="152" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="340" y="700" text-anchor="middle" dominant-baseline="central" fill="#791F1F">AWS never called</text>

<!-- HUMAN path -->
<line x1="560" y1="556" x2="560" y2="592" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="484" y="594" width="152" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="560" y="614" text-anchor="middle" dominant-baseline="central" fill="#633806">Execution paused</text>
<text font-size="12" x="560" y="632" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Slack / webhook fired</text>
<line x1="560" y1="646" x2="560" y2="676" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="484" y="678" width="152" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="500" x="560" y="698" text-anchor="middle" dominant-baseline="central" fill="#633806">Human approves /</text>
<text font-size="12" x="560" y="716" text-anchor="middle" dominant-baseline="central" fill="#854F0B">denies via dashboard</text>

<!-- Key insight box -->
<rect x="60" y="748" width="560" height="54" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" font-weight="500" x="340" y="768" text-anchor="middle" dominant-baseline="central" fill="#444441">Key enforcement guarantee: the agent has no direct AWS credentials.</text>
<text font-size="12" x="340" y="788" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">All cloud calls are proxied through Sentinel. Bypass is architecturally prevented.</text>

<!-- Arrows to audit -->
<path d="M120 722 Q120 840 290 870" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5"/>
<path d="M340 722 L340 872" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5"/>
<path d="M560 722 Q560 840 400 870" fill="none" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5"/>

<!-- Audit Log -->
<rect x="210" y="874" width="260" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="896" text-anchor="middle" dominant-baseline="central" fill="#444441">Audit / Action Log</text>

<text font-size="11" x="340" y="950" text-anchor="middle" fill="#888780">Agent Sentinel: Enforcement Architecture</text>
</svg>
